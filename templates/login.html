<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#13151f">
  <title>Sign in — TradeAgent</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/static/icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TradeAgent">
  <link rel="stylesheet" href="/static/app.css?v={{ asset_v }}">
  <style>
    .login-wrap { min-height: 100vh; display: flex; align-items: center;
                  justify-content: center; padding: 24px; }
    .login-card { width: 100%; max-width: 360px; background: var(--surface-1, #16181d);
                  border: 0.5px solid var(--row-border, #2a2d34); border-radius: 12px;
                  padding: 28px 24px; }
    .login-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-secondary, #8b90a0);
                 margin-bottom: 20px; }
    .login-card label { display: block; font-size: 12px;
                        color: var(--text-secondary, #8b90a0); margin-bottom: 6px; }
    .login-card input[type=password] { width: 100%; padding: 10px 12px;
        border-radius: 8px; border: 0.5px solid var(--row-border, #2a2d34);
        background: var(--bg-stat, #0f1115); color: var(--text-primary, #e6e8ee);
        font-size: 14px; margin-bottom: 16px; }
    .login-btn { width: 100%; padding: 10px 12px; border: none; border-radius: 8px;
        background: var(--accent, #3b82f6); color: #fff; font-size: 14px;
        font-weight: 500; cursor: pointer; }
    .login-btn:hover { filter: brightness(1.08); }
    .login-err { background: rgba(220,38,38,.12); border: 0.5px solid #dc2626;
        color: #f87171; font-size: 13px; padding: 8px 10px; border-radius: 8px;
        margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">TradeAgent</div>
      <div class="login-sub">Sign in to continue</div>
      {% if error %}<div class="login-err">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next }}">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autofocus
               autocomplete="current-password" required>
        <button type="submit" class="login-btn">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
