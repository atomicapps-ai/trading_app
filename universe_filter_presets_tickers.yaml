# Universe Filter — Preset Ticker Lists
#
# Companion file to universe_filter_presets.yaml. The *criteria* file holds
# filter definitions (rarely edited). This file holds the ticker lists each
# preset resolves to (rewritten periodically by scripts/refresh_universe.py).
#
# Split rationale:
#   * criteria + ticker list in one file => ticker churn drowns out criteria
#     diffs and the file balloons past readability.
#   * separate files => one place for hand-tuned filter logic, one place
#     where the refresh script writes results. Both committed to git so
#     we can see how the universe moved over time.
#
# Format:
#   presets:
#     <preset_name>:
#       refreshed_at: <iso8601>
#       source: "manual" | "finviz:<query>" | "tradestation_scan"
#       tickers: [AAA, BBB, ...]
#
# Presets that DON'T live here:
#   * etf_sector_rotation     — whitelist is hardcoded in the criteria file
#   * sentiment_catalyst      — on-demand, no pre-computed universe

