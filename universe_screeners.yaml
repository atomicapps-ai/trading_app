- name: volatility_compression
  title: volatility_compression
  description: "Stocks in a state of volatility compression \u2014 low ATR relative\
    \ to their historical range, consolidating after a trend move. These are the hunting\
    \ grounds for squeeze setups, inside bars, triangles, and cup formations. The\
    \ key insight: we want names that are quiet NOW but were active recently. Permanently\
    \ quiet stocks are not compressing \u2014 they are just illiquid.\n"
  notes: "This preset produces 50-150 symbols. The analyst agent must then apply the\
    \ squeeze detector and inside bar detector to narrow this list \u2014 the preset\
    \ gets you in the right neighborhood, the pattern detector confirms the specific\
    \ setup. Expect more signals from this preset after strong trending periods (stocks\
    \ digest gains quietly before the next leg). Fewer signals in choppy, mean-reverting\
    \ markets.\n"
  is_active: false
  filters: {}
  output_tags:
  - compression
  - squeeze_candidate
  - low_volatility_setup
