- name: wyckoff_accumulation_watch
  title: wyckoff_accumulation_watch
  description: "Identifies stocks potentially in a Wyckoff accumulation phase \u2014\
    \ high-quality names that have undergone a significant decline from a prior peak\
    \ and are now range-bound with high volume on the initial lows and declining volume\
    \ during the consolidation. This preset feeds the longest-duration trades (15-60\
    \ day holds). Quality filters are the strictest of all presets because Wyckoff\
    \ only works reliably in fundamentally excellent companies.\n"
  notes: "This is the slowest-moving preset. Run it weekly on Sunday evening to build\
    \ the Wyckoff watchlist for the coming week. Expect 15-60 symbols. The analyst\
    \ agent applies the full Wyckoff phase identification algorithm to each symbol\
    \ \u2014 this is compute-intensive and should not run during market hours. The\
    \ spring and LPS signals from the Wyckoff detector update in real-time during\
    \ the session. Biotech is hard-excluded here (not just flagged) because FDA binary\
    \ events destroy Wyckoff setups unpredictably.\n"
  is_active: false
  filters: {}
  output_tags:
  - wyckoff_candidate
  - base_building
  - position_trade
  - high_quality_fundamental
  tickers: []
  tickers_refreshed_at: null
