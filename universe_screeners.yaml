- name: core_universe_100
  title: Core Universe 100 (Quality + Trending + Goldilocks Vol)
  description: "Two-stage screener for the price_action_pattern_recog_matrix system.\
    \ Stage 1 (Finviz): mid+ cap US-listed stocks, ADV>2M, price>$15, 5-yr profitable,\
    \ op margin positive, trading above SMA50 and SMA200. Stage 2 (local): ATR(14)/price\
    \ between 1.5%-4% to exclude dead names and meme-style hyper-volatile stocks.\
    \ Target ~100 names \u2014 quality, liquid, in-trend, with normalized volatility."
  notes: "Stage 1 produced via Finviz scrape. Stage 2 computed locally from cached\
    \ daily bars. Re-run weekly to refresh \u2014 universe drifts as names cross above/below\
    \ the SMA50/200 trend gates and as ATR contracts/expands. v4 (2026-05-09): re-added\
    \ strict fundamentals (fa_curratio>1, fa_debteq<1, fa_eps5years>0) now that max_pages=50\
    \ captures the full ~500-ticker candidate set. Mag-7 names that fail strict balance-sheet\
    \ filters (e.g. AAPL D/E>1 from buybacks) are FORCE-INCLUDED via the override\
    \ list below, but still subject to Stage 2 (ATR%/SMA) \u2014 so a Mag-7 in downtrend\
    \ is correctly excluded."
  is_active: false
  filters:
    sh_price: o15
    sh_avgvol: o2000
    cap: midover
    geo: usa
    fa_pe: profitable
    fa_opermargin: pos
    fa_eps5years: pos
    fa_curratio: o1
    fa_debteq: u1
