- name: high_atr_liquid
  title: High-ATR Liquid (>$10, >2M vol, ATR>$3)
  description: US stocks priced over $10 with average daily volume over 2M shares
    and Average True Range above $3 USD. Wide enough to find swing-trade candidates
    but liquid enough that fills are clean. Used as the expanded universe for random_search.py.
  notes: "Filters chosen to surface stocks with enough $-range per day to produce\
    \ meaningful swing trades. ATR>$3 in raw USD = at least $3 of intraday movement\
    \ on average \u2014 too tight a range eliminates the edge of any directional strategy.\
    \ This is a much broader universe than bellwether_16."
  is_active: false
  filters:
    sh_price: o10
    sh_avgvol: o2000
    ta_averagetruerange: o3
