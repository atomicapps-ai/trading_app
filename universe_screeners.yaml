- name: mean_reversion_oversold
  title: mean_reversion_oversold
  description: "Established, profitable companies that have pulled back sharply from\
    \ a healthy base. These are NOT broken stocks \u2014 they are temporarily oversold\
    \ names with strong fundamentals that are likely to revert. The quality filters\
    \ are intentionally strict because mean reversion only works on high-quality names.\
    \ Beaten-down speculative stocks do not revert \u2014 they continue lower.\n"
  notes: "Expect 20-80 symbols on most days. The list will be largest after a market\
    \ correction or sector rotation event. The 200 SMA requirement above is the most\
    \ important filter in this preset \u2014 it separates temporary pullbacks in healthy\
    \ companies from genuine downtrends. When the overall market is in a downtrend\
    \ (SPY below 200 SMA), reduce position sizes on all signals from this preset by\
    \ 50%.\n"
  is_active: false
  filters: {}
