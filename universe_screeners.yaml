- name: etf_sector_rotation
  title: etf_sector_rotation
  description: 'US-listed sector and broad-market ETFs for the dual-momentum rotation
    strategy. No profitability filters (ETFs are funds, not companies). Filters focus
    on liquidity, tracking quality, and exclusion of leveraged/inverse products unless
    explicitly configured. Rebalance check runs weekly on Monday pre-market.

    '
  notes: "This preset runs WEEKLY on Monday at 08:00 ET (not daily). The rotation\
    \ logic in the analyst macro lens ranks all ETFs in the universe by: (1) 3-month\
    \ absolute return vs cash, (2) 1-month relative return vs SPY. Top 3 ETFs by combined\
    \ score are held. Bottom performers are sold. Transaction costs matter for rotation\
    \ \u2014 do not rotate unless the new ETF score exceeds the current holding by\
    \ at least 5 points on the ranking scale (prevents excessive churn).\n"
  is_active: false
