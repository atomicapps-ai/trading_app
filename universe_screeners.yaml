- name: sentiment_catalyst
  title: sentiment_catalyst
  description: "Highly liquid names where a fresh catalyst has been detected by the\
    \ news_sentinel. Unlike the other presets which run pre-market, this preset is\
    \ designed to be triggered ON DEMAND by the analyst agent when a high-novelty,\
    \ high-relevance event is detected. The filters are looser on technical state\
    \ because the catalyst overrides normal setup requirements \u2014 we need to be\
    \ able to get in and out cleanly, which demands extreme liquidity.\n"
  notes: "This preset is NOT run on a schedule. It is invoked by the analyst agent\
    \ when the news_sentinel emits an event_signal with urgency >= \"medium\". The\
    \ relative_volume_min: 2.0 filter is the most important \u2014 if the market is\
    \ not already reacting to the catalyst with volume, the information is likely\
    \ already priced in or the novelty score is overstated. Do not enter catalyst\
    \ trades in the first 5 minutes of the session or the last 30 minutes. Time stop\
    \ is mandatory: exit by session close on day 2 at latest.\n"
  is_active: false
  filters: {}
  output_tags:
  - catalyst
  - event_driven
  - high_liquidity_required
  tickers: []
  tickers_refreshed_at: null
