workflow_id: momentum_breakout_scan
description: >
  Daily post-close scan for the Momentum Breakout strategy (S7). Screens
  liquid_momentum_core, runs only the volume-confirmed breakout detector, builds
  plans, and queues them to /pending for human approval. Paper mode.
default_mode: paper
schedule: "15 16 * * 1-5"   # 16:15 ET Mon-Fri (after the close)

steps:
  - id: filter_universe
    kind: filter_universe
    params:
      preset: liquid_momentum_core
      shortlist_size: 60
  - id: compute_macro
    kind: compute_macro
    depends_on: [filter_universe]
  - id: analyze
    kind: analyze
    params:
      strategy: momentum_breakout
      lenses: [technical, macro]
    depends_on: [compute_macro]
  - id: plan
    kind: plan
    params:
      strategy: momentum_breakout
    depends_on: [analyze]
