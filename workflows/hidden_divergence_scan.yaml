workflow_id: hidden_divergence_scan
description: >
  Daily post-close scan for the Hidden Divergence strategy (RSI bullish hidden-divergence trend
  continuation; cleanest diversifier in the book, <=0.24 corr to every live strategy). Screens
  liquid_momentum_core, runs only the hidden_divergence detector, builds plans, queues to /pending.
  Paper mode.
default_mode: paper
# Enable/disable from the /strategies UI (or active: in the config). The cron is registered but
# skipped at fire-time unless the strategy is effectively enabled — no restart needed to arm.
# Ships disabled (active:false) until reviewed.
schedule: "45 16 * * 1-5"   # 16:45 ET Mon-Fri

steps:
  - id: filter_universe
    kind: filter_universe
    params:
      preset: liquid_momentum_core
      shortlist_size: 500
  - id: compute_macro
    kind: compute_macro
    depends_on: [filter_universe]
  - id: analyze
    kind: analyze
    params:
      strategy: hidden_divergence
      lenses: [technical, macro]
    depends_on: [compute_macro]
  - id: plan
    kind: plan
    params:
      strategy: hidden_divergence
    depends_on: [analyze]
