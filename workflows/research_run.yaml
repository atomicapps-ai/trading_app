workflow_id: research_run
description: >
  Manual research run — technical-only, no news, no filings. Research mode
  means no broker calls and compliance gates C1/C2/C3 are advisory. Safe
  to trigger any time. Use this to sanity-check the pipeline without
  tripping any live-market behavior.
default_mode: research
# no schedule — manual trigger only

steps:
  - id: filter_universe
    kind: filter_universe
    params:
      preset: liquid_momentum_core
      shortlist_size: 50
  - id: compute_macro
    kind: compute_macro
    depends_on: [filter_universe]
  - id: analyze
    kind: analyze
    params:
      lenses: [technical, macro]
    depends_on: [compute_macro]
  - id: plan
    kind: plan
    depends_on: [analyze]
