strategy_name: momentum_breakout
version: "1.0"
description: >
  Momentum Breakout (formerly S7): buys multi-month (126-day) high breakouts that
  are CONFIRMED BY VOLUME, then lets winners run with a 50-day SMA trail. Best in
  strong markets (SPY above its 200-MA). Low win rate (~25%), large winners
  (~1.2R expectancy OOS). Hardened + filter-validated — see
  strategies/strategy_docs/HARDENING_S7_S5.md.
universe_filter_preset: liquid_momentum_core
mode: paper
active: true
holding_period: swing_days

# Trade type (surfaced as badges + grouping on /strategies)
style: swing              # swing | day_trade
family: trend_breakout    # the category of edge (a proxy for what it correlates with)
instrument: us_equity     # us_equity | fx
direction: long           # long | long_short

# Technical lens scoped to ONLY the breakout detector.
detectors:
  - s7_breakout_continuation

min_signal_strength: 0.55

# Each qualifying breakout builds a plan (validated standalone).
portfolio_rules:
  single_signal_override: 0.55
  min_patterns_agreeing: 1
  min_lenses_agreeing: 2
  trail_mode: atr
  trail_atr_multiple: 3.0      # loose trail = let winners run (50-MA-trail proxy)
  trail_atr_period: 14
  trail_activate_after: "price >= entry + 1.5R"
  time_stop_sessions: 120      # trends can run for months

risk:
  max_risk_pct_per_trade: 0.50
  max_position_pct_of_equity: 8.0
  min_rr_ratio: 2.0

pattern_thresholds:
  s7_breakout_continuation:
    lookback_high: 126
    stop_atr_mult: 1.0
    tp1_r_multiple: 3.0
    tp2_r_multiple: 6.0
    # Selection filter (top attribution result: vol>=1.5x ~doubled expectancy).
    require_breakout_volume: true
    breakout_volume_min: 1.5
    # Phase-2 entry filters (attribution): skip choppy markets + favor healthy
    # (not over-extended) breakouts. ADX<20 was PF ~1.1; 5-15% above 200MA = PF 2.34.
    require_min_adx: 20.0
    trend_zone_lo: 0.05
    trend_zone_hi: 0.15
    require_trend_zone: false
